<!-- Semantic model metadata browser -->
<div id="metadata-browser" class="hidden">
    <h3 class="text-lg font-semibold mb-4">Semantic Model</h3>

    <!-- Two options: connect or upload -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white border-2 border-blue-200 rounded-lg p-4 cursor-pointer hover:border-blue-500"
             onclick="showMetadataConnect()">
            <h4 class="font-medium text-blue-700">Connect to Power BI</h4>
            <p class="text-xs text-gray-500 mt-1">Browse datasets in your workspace</p>
        </div>
        <div class="bg-white border-2 border-gray-200 rounded-lg p-4 cursor-pointer hover:border-gray-500"
             onclick="showMetadataUpload()">
            <h4 class="font-medium text-gray-700">Upload Metadata File</h4>
            <p class="text-xs text-gray-500 mt-1">Upload a .md or .txt file</p>
        </div>
    </div>

    <!-- Connect panel -->
    <div id="metadata-connect-panel" class="hidden space-y-4">
        <button type="button" onclick="loadDatasets()" id="load-datasets-btn"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">
            Load Datasets
        </button>
        <div id="datasets-list" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">Select Dataset</label>
            <select id="dataset-select" class="w-full border rounded-lg px-3 py-2 text-sm"
                    onchange="previewDatasetMetadata()">
                <option value="">-- Choose a dataset --</option>
            </select>
        </div>
        <div id="metadata-preview" class="hidden bg-gray-50 rounded-lg p-4 max-h-96 overflow-y-auto">
            <h4 class="font-medium text-gray-700 mb-2">Metadata Preview</h4>
            <div id="metadata-preview-content" class="text-sm"></div>
        </div>
        <button type="button" id="use-dataset-btn" onclick="useSelectedDataset()"
                class="hidden bg-green-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-700">
            Use This Model
        </button>
    </div>

    <!-- Upload panel -->
    <div id="metadata-upload-panel" class="hidden space-y-4">
        <input type="file" id="metadata-file-input" accept=".md,.txt" class="file-input">
        <button type="button" onclick="uploadMetadataFile()"
                class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-700">
            Upload
        </button>
    </div>

    <!-- Result display -->
    <div id="metadata-result" class="hidden mt-4 bg-gray-50 rounded-lg p-4 max-h-64 overflow-y-auto">
        <h4 class="font-medium text-green-700 mb-2">Model Metadata Loaded</h4>
        <pre id="metadata-result-content" class="text-xs text-gray-600 whitespace-pre-wrap"></pre>
    </div>
</div>
