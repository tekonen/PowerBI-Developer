<!-- Structured brief review panel -->
<div id="brief-review" class="hidden">
    <h3 class="text-lg font-semibold mb-4">Structured Requirements</h3>
    <div id="brief-content" class="space-y-4">
        <div class="bg-gray-50 rounded-lg p-4">
            <h4 class="font-medium text-gray-700" id="brief-title"></h4>
            <p class="text-sm text-gray-500 mt-1" id="brief-audience"></p>
        </div>

        <div id="brief-pages" class="space-y-3"></div>

        <div id="brief-kpis-section" class="bg-blue-50 rounded-lg p-4">
            <h4 class="font-medium text-blue-700 mb-2">KPIs</h4>
            <ul id="brief-kpis" class="text-sm space-y-1"></ul>
        </div>

        <div id="brief-questions-section" class="bg-green-50 rounded-lg p-4">
            <h4 class="font-medium text-green-700 mb-2">Analytical Questions</h4>
            <ul id="brief-questions" class="text-sm space-y-1"></ul>
        </div>

        <div id="brief-constraints-section" class="hidden bg-yellow-50 rounded-lg p-4">
            <h4 class="font-medium text-yellow-700 mb-2">Constraints</h4>
            <ul id="brief-constraints" class="text-sm space-y-1"></ul>
        </div>
    </div>
</div>
