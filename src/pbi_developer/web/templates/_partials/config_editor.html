<div id="config-panel">
    <h3 class="text-lg font-semibold mb-4">Global Configuration</h3>

    <!-- Environment Variables Section -->
    <div class="mb-6">
        <h4 class="text-sm font-medium text-gray-700 mb-3 uppercase tracking-wider">Environment Variables</h4>
        <div class="bg-gray-50 rounded-lg p-4 border">
            <p class="text-xs text-gray-500 mb-3">These values are set via .env file or environment. Sensitive values are masked.</p>
            <table class="w-full text-sm" id="env-vars-table">
                <thead class="text-left text-xs text-gray-500 uppercase">
                    <tr><th class="pb-2">Variable</th><th class="pb-2">Value</th><th class="pb-2">Source</th></tr>
                </thead>
                <tbody id="env-vars-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Settings.yaml Section -->
    <div class="mb-6">
        <h4 class="text-sm font-medium text-gray-700 mb-3 uppercase tracking-wider">Settings (settings.yaml)</h4>
        <div id="settings-sections" class="space-y-4"></div>
        <div class="mt-4 flex justify-end">
            <button onclick="saveGlobalConfig()" id="save-config-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">
                Save Changes
            </button>
        </div>
    </div>

    <!-- Config save feedback -->
    <div id="config-success" class="hidden mt-3 bg-green-50 text-green-700 text-sm rounded-lg p-3"></div>
    <div id="config-error" class="hidden mt-3 bg-red-50 text-red-700 text-sm rounded-lg p-3"></div>
</div>
