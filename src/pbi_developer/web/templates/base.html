<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Power BI Developer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="h-full">
    <div class="flex h-full">
        <!-- Sidebar -->
        <nav class="w-56 bg-gray-900 text-white flex flex-col flex-shrink-0">
            <div class="p-4 border-b border-gray-700">
                <h1 class="text-lg font-bold">PBI Developer</h1>
                <p class="text-xs text-gray-400 mt-1">AI-Powered Reports</p>
            </div>
            <ul class="flex-1 py-4 space-y-1">
                <li>
                    <a href="/" class="nav-link {% if active == 'dashboard' %}nav-active{% endif %}">
                        <span class="mr-2">&#9632;</span> Dashboard
                    </a>
                </li>
                <li>
                    <a href="/generate" class="nav-link {% if active == 'generate' %}nav-active{% endif %}">
                        <span class="mr-2">&#9654;</span> Generate
                    </a>
                </li>
                <li>
                    <a href="/refine" class="nav-link {% if active == 'refine' %}nav-active{% endif %}">
                        <span class="mr-2">&#8634;</span> Refine
                    </a>
                </li>
                <li>
                    <a href="/deploy" class="nav-link {% if active == 'deploy' %}nav-active{% endif %}">
                        <span class="mr-2">&#9650;</span> Deploy
                    </a>
                </li>
                <li>
                    <a href="/settings" class="nav-link {% if active == 'settings' %}nav-active{% endif %}">
                        <span class="mr-2">&#9881;</span> Settings
                    </a>
                </li>
            </ul>
            <div class="p-4 border-t border-gray-700 text-xs text-gray-500">
                pbi-dev v0.1.0
            </div>
        </nav>

        <!-- Main content -->
        <main class="flex-1 overflow-y-auto p-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
