<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Power BI Developer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/app.css">
    <!-- Prefetch all pages for instant navigation -->
    <link rel="prefetch" href="/generate">
    <link rel="prefetch" href="/refine">
    <link rel="prefetch" href="/deploy">
    <link rel="prefetch" href="/versions">
    <link rel="prefetch" href="/settings">
</head>
<body class="h-full">
    <div class="flex h-full">
        <!-- Mobile hamburger -->
        <button onclick="toggleSidebar()" class="md:hidden fixed top-3 left-3 z-50 bg-gray-900 text-white p-2 rounded-lg shadow-lg">
            <svg id="hamburger-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>

        <!-- Sidebar overlay (mobile) -->
        <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar w-56 bg-gray-900 text-white flex-col flex-shrink-0 hidden md:flex">
            <div class="p-4 border-b border-gray-700">
                <h1 class="text-lg font-bold">PBI Developer</h1>
                <p class="text-xs text-gray-400 mt-1">AI-Powered Reports</p>
            </div>
            <ul class="flex-1 py-4 space-y-1">
                <li>
                    <a href="/" class="nav-link {% if active == 'dashboard' %}nav-active{% endif %}">
                        <span class="mr-2">&#9632;</span> Dashboard
                    </a>
                </li>
                <li>
                    <a href="/generate" class="nav-link {% if active == 'generate' %}nav-active{% endif %}">
                        <span class="mr-2">&#9654;</span> Generate
                    </a>
                </li>
                <li>
                    <a href="/refine" class="nav-link {% if active == 'refine' %}nav-active{% endif %}">
                        <span class="mr-2">&#8634;</span> Refine
                    </a>
                </li>
                <li>
                    <a href="/deploy" class="nav-link {% if active == 'deploy' %}nav-active{% endif %}">
                        <span class="mr-2">&#9650;</span> Deploy
                    </a>
                </li>
                <li>
                    <a href="/versions" class="nav-link {% if active == 'versions' %}nav-active{% endif %}">
                        <span class="mr-2">&#128260;</span> Versions
                    </a>
                </li>
                <li>
                    <a href="/settings" class="nav-link {% if active == 'settings' %}nav-active{% endif %}">
                        <span class="mr-2">&#9881;</span> Settings
                    </a>
                </li>
                <li>
                    <a href="/admin" class="nav-link {% if active == 'admin' %}nav-active{% endif %}">
                        <span class="mr-2">&#9733;</span> Admin
                    </a>
                </li>
            </ul>
            <div class="p-4 border-t border-gray-700 text-xs text-gray-500">
                {% if user_email %}
                <div class="mb-2 truncate text-gray-400" title="{{ user_email }}">{{ user_email }}</div>
                <form action="/auth/logout" method="POST">
                    <button type="submit" class="text-gray-500 hover:text-gray-300 text-xs">Sign Out</button>
                </form>
                {% endif %}
                <div class="mt-1">pbi-dev v0.1.0</div>
            </div>
        </nav>

        <!-- Main content -->
        <main class="flex-1 overflow-y-auto p-4 md:p-8 pt-14 md:pt-8 fade-in">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
