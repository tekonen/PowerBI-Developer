{% extends "base.html" %}
{% set active = "admin" %}
{% block title %}Admin — PBI Developer{% endblock %}

{% block content %}
<div class="max-w-6xl">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Admin Dashboard</h2>

    <!-- Tab buttons -->
    <div class="flex space-x-1 border-b border-gray-200 mb-6">
        <button onclick="switchAdminTab('users')" id="tab-btn-users"
                class="px-4 py-2 text-sm font-medium text-blue-600 border-b-2 border-blue-600 -mb-px">
            Users
        </button>
        <button onclick="switchAdminTab('runs')" id="tab-btn-runs"
                class="px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">
            Runs
        </button>
        <button onclick="switchAdminTab('prompts')" id="tab-btn-prompts"
                class="px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">
            System Prompts
        </button>
        <button onclick="switchAdminTab('config')" id="tab-btn-config"
                class="px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">
            Configuration
        </button>
    </div>

    <!-- Tab: Users -->
    <div id="tab-users" class="admin-tab">
        <div class="bg-white rounded-lg shadow p-6">
            <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wider mb-4">All Users</h3>
            <div id="users-table-wrapper">
                <div class="skeleton h-32 rounded"></div>
            </div>
        </div>
    </div>

    <!-- Tab: Runs -->
    <div id="tab-runs" class="admin-tab hidden">
        <div class="bg-white rounded-lg shadow p-6">
            <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wider mb-4">All Runs</h3>
            <div id="runs-table-wrapper">
                <div class="skeleton h-32 rounded"></div>
            </div>
            <div class="mt-4 text-center">
                <button onclick="loadRuns(runsOffset)" id="runs-load-more"
                        class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 text-sm hidden">
                    Load More
                </button>
            </div>
        </div>
    </div>

    <!-- Tab: System Prompts -->
    <div id="tab-prompts" class="admin-tab hidden">
        <div id="prompts-wrapper">
            <div class="skeleton h-32 rounded"></div>
        </div>
    </div>

    <!-- Tab: Configuration -->
    <div id="tab-config" class="admin-tab hidden">
        <div class="bg-white rounded-lg shadow p-6">
            <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wider mb-4">Global Configuration</h3>
            <div id="config-form-wrapper">
                <div class="skeleton h-32 rounded"></div>
            </div>
            <div id="config-save-status" class="mt-3 text-sm hidden"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/admin.js"></script>
{% endblock %}
